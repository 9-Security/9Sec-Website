name: Check assets

# Guard against duplicated / accumulated asset bundles reaching the live site.
# See scripts/ASSET-DEDUP.md.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  check-asset-dedup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check for bundle duplication / accumulation
        run: node scripts/check-asset-dedup.mjs
