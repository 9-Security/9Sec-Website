<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Scanner | Nine-Security</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons: inline SVG only (avoids third-party CDN + Tracking Prevention noise in strict browsers) -->
    <!-- Custom CSS -->
    <link rel="icon" type="image/png" href="/assets/favicon-CBZfJaNW.png">
    
    <style>
        .scanner-container {
            max-width: 900px;
            margin: 0 auto;
            padding-top: 120px;
            padding-bottom: 80px;
        }

        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 3rem;
            text-align: center;
            position: relative;
            margin-bottom: 3rem;
        }

        .search-box::before {
            content: 'SYSTEM_INPUT';
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--bg-color);
            padding: 0 10px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent-color);
        }

        input[type="text"] {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .results-area {
            margin-top: 3rem;
            display: none;
        }

        .hit-card {
            background: rgba(255, 0, 85, 0.05);
            border: 1px solid rgba(255, 0, 85, 0.2);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .hit-card::after {
            content: 'THREAT';
            position: absolute;
            right: -10px;
            bottom: -5px;
            font-size: 2rem;
            font-family: var(--font-mono);
            color: rgba(255, 0, 85, 0.1);
            font-weight: 700;
            pointer-events: none;
        }

        .hit-card:hover {
            border-color: #ff0055;
            background: rgba(255, 0, 85, 0.1);
            transform: translateX(5px);
        }

        .hit-domain {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: #ff0055;
            font-weight: 600;
        }

        .hit-ip {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: var(--font-mono);
            margin-top: 0.3rem;
        }

        .hit-rule {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            background: rgba(255, 0, 85, 0.2);
            padding: 0.3rem 0.8rem;
            color: #ff0055;
            border: 1px solid rgba(255, 0, 85, 0.5);
        }

        .status-bar {
            font-family: var(--font-mono);
            color: var(--accent-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 2px solid var(--accent-secondary);
        }

        /* Loading Spinner Overwrite */
        .loading-spinner {
            display: none;
            margin: 3rem auto;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0, 255, 65, 0.1);
            border-top-color: var(--accent-color);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .inline-icon {
            width: 1em;
            height: 1em;
            vertical-align: -0.125em;
            margin-right: 0.35em;
            fill: currentColor;
        }
    </style>
  <script type="module" crossorigin src="/assets/styles-DNt-iECB.js"></script>
  <script type="module" crossorigin src="/assets/main-DrFHyMuV.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/styles-BxbEqz2_.css">
</head>

<body>
    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>
    <!-- Overlay Scanline Effect -->
    <div class="scanlines"></div>

    <header>
        <nav class="container">
            <div class="logo">
                <a href="./" style="text-decoration: none; display: flex; align-items: center; gap: 1rem; color: inherit;">
                    <img src="/assets/logo_v2-DUFKW_m4.png" alt="Nine-Security Logo" class="logo-img">
                    <span class="logo-text">Nine<span class="accent">Security</span><span class="blink">_</span></span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="./">/Home</a></li>
                <li><a href="services.html">/Services</a></li>
                <li><a href="arsenal.html" class="active">/Arsenal</a></li>
                <li><a href="./#model">/9SEC_Model</a></li>
                <li><a href="contact.html">/Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="scanner-container">
            <div style="text-align: center; margin-bottom: 3rem;">
                <p class="terminal-text">Initializing Apex Brand Intelligence Engine... <span class="status-ok">[READY]</span></p>
                <h1 class="glitch-title" data-text="BRAND ABUSE SCANNER">BRAND ABUSE SCANNER</h1>
                <p class="subtitle">Deep scan for registered phishing and squatting domains using Apex Engine.</p>
            </div>

            <div class="search-box">
                <input type="text" id="targetDomain" placeholder="Enter target domain (e.g. your-domain.com)" spellcheck="false">
                <div class="cta-group">
                    <button class="btn primary-btn" id="scanBtn" type="button">
                        <svg class="inline-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        START_DEEP_SCAN
                    </button>
                </div>
            </div>

            <div class="loading-spinner" id="loader"></div>
            
            <div class="results-area" id="resultsArea">
                <div class="status-bar" id="statusBar"></div>
                <div id="hitsList"></div>
            </div>
        </div>
    </main>

    <footer id="contact">
        <div class="container footer-content">
            <div class="copyright">
                <p>&copy; 2026 Nine-Security. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = "https://gov.nine-security.com";
        const scanBtn = document.getElementById('scanBtn');
        const targetInput = document.getElementById('targetDomain');
        const loader = document.getElementById('loader');
        const resultsArea = document.getElementById('resultsArea');
        const hitsList = document.getElementById('hitsList');
        const statusBar = document.getElementById('statusBar');

        function escapeHtml(value) {
            if (value == null) return '';
            const div = document.createElement('div');
            div.textContent = String(value);
            return div.innerHTML;
        }

        scanBtn.addEventListener('click', async () => {
            const domain = targetInput.value.trim();
            if (!domain) return;

            // UI Reset
            scanBtn.disabled = true;
            loader.style.display = 'block';
            resultsArea.style.display = 'none';
            hitsList.innerHTML = '';
            statusBar.innerText = '> Initializing Scan Protocol...';

            try {
                const response = await fetch(`${API_BASE}/api/domain/instant-scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain })
                });

                const data = await response.json();
                loader.style.display = 'none';
                scanBtn.disabled = false;

                if (!data.ok) throw new Error(data.error);

                resultsArea.style.display = 'block';
                statusBar.innerText = `[SUCCESS] Analysis complete. Scanned ${data.total_scanned} variations. Found ${data.hits.length} threats.`;

                if (data.hits.length === 0) {
                    hitsList.innerHTML = `
                        <div class="card" style="text-align:center; padding: 2rem; border-color: var(--accent-color);">
                            <svg class="inline-icon" style="width:2rem;height:2rem;color:var(--accent-color);margin-bottom:1rem;display:inline-block;" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v7.8z"/></svg>
                            <p style="color: var(--accent-color); font-family: var(--font-mono);">SAFE: No active threats detected for this domain.</p>
                        </div>
                    `;
                } else {
                    data.hits.forEach(hit => {
                        const card = document.createElement('div');
                        card.className = 'hit-card';
                        card.innerHTML = `
                            <div>
                                <div class="hit-domain">${escapeHtml(hit.candidate_domain || '')}</div>
                                <div class="hit-ip">RESOLVED_IP: ${escapeHtml(hit.ip || '')}</div>
                            </div>
                            <div class="hit-rule">${escapeHtml(String(hit.rule || '').toUpperCase())}</div>
                        `;
                        hitsList.appendChild(card);
                    });
                }

            } catch (err) {
                statusBar.innerText = `[ERROR] ${err.message}`;
                loader.style.display = 'none';
                scanBtn.disabled = false;
                resultsArea.style.display = 'block';
            }
        });

        targetInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') scanBtn.click();
        });
    </script>
</body>
</html>
